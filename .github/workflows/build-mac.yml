name: Build Mac Client

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      # In a real project you'd configure signing keys via secrets here
      # For now we'll do an ad-hoc build
      - name: Build App Bundle
        run: ./scripts/build_mac.sh
        
      - name: Zip
        run: cd build/mac && zip -r ../../FlowDesk-mac.zip FlowDesk.app
        
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FlowDesk-mac
          path: FlowDesk-mac.zip
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: FlowDesk-mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
